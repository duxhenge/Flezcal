# .swiftlint.yml — Flezcal
# Tailored for SwiftUI + Firebase iOS app (66 source files)
#
# Philosophy: Start with rules the codebase already passes, then tighten
# incrementally. Rules that produce violations on existing code are disabled
# and listed under "Future Rules" for later adoption.

# ─── Paths ─────────────────────────────────────────────────────────
included:
  - Flezcal
  - FlezcalTests
  - FlezcalUITests

excluded:
  - build
  - DerivedData
  - .build
  - Flezcal.xcodeproj

# ─── Enabled Opt-In Rules ──────────────────────────────────────────
# Only rules the codebase currently passes cleanly.
opt_in_rules:
  # Safety
  - force_unwrapping

  # Code quality
  - closure_end_indentation
  - closure_spacing
  - contains_over_filter_count
  - contains_over_first_not_nil
  - empty_collection_literal
  - empty_string
  - fatal_error_message
  - first_where
  - identical_operands
  - joined_default_parameter
  - last_where
  - legacy_multiple
  - overridden_super_call
  - redundant_nil_coalescing
  - sorted_first_last
  - toggle_bool
  - unavailable_function
  - yoda_condition

# ─── Disabled Rules ────────────────────────────────────────────────
# Rules that conflict with existing code patterns or produce too much noise.
disabled_rules:
  - trailing_comma
  - opening_brace
  - todo
  - nesting
  - large_tuple
  - multiple_closures_with_trailing_syntax
  - implicit_optional_initialization   # Codebase uses explicit = nil for clarity
  - comma                              # Some multiline formatting uses trailing commas with spaces

# ─── Future Rules (disabled until codebase is cleaned up) ──────────
# These are valuable but the codebase has too many existing violations.
# Enable one at a time and fix violations in a dedicated PR.
#
# - multiline_arguments          # ~20+ violations: args mixed on same/different lines
# - multiline_parameters         # ~15+ violations: func params mixed on same/different lines
# - discouraged_optional_boolean  # ~3 violations: Bool? used for userVote, previousVote
# - implicitly_unwrapped_optional # Review after removing any IB patterns
# - prefer_self_in_static_references # ~10+ violations: Type.method vs Self.method
# - empty_count                  # ~5 violations: .count == 0 vs .isEmpty
# - collection_alignment         # Alignment style varies across files
# - literal_expression_end_indentation
# - prefer_zero_over_explicit_init
# - unneeded_parentheses_in_closure_argument

# ─── Rule Configuration ───────────────────────────────────────────

# File length: Largest file is 1383 lines (SpotDetailView).
# FoodCategory.swift and SpotCategory.swift are necessarily large (50-category switch statements).
file_length:
  warning: 600
  error: 1500
  ignore_comment_only_lines: true

# Type body length: SpotDetailView body is long due to SwiftUI composition.
# SpotCategory enum has 9 switch statements × 50 cases — structural, not a code smell.
type_body_length:
  warning: 500
  error: 1200

# Function body length: Most functions are short; a few service methods are long.
function_body_length:
  warning: 80
  error: 200

# Line length: Raised to accommodate existing code. Firestore paths and
# SwiftUI chains frequently exceed 140. Error threshold catches truly egregious lines.
line_length:
  warning: 160
  error: 250
  ignores_urls: true
  ignores_comments: true
  ignores_interpolated_strings: true

# Cyclomatic complexity
cyclomatic_complexity:
  warning: 15
  error: 25
  ignores_case_statements: true

# Identifier names: Allow single-char names used in the codebase
identifier_name:
  min_length:
    warning: 1
  max_length:
    warning: 60
  excluded:
    - id
    - db
    - i
    - x
    - y
    - _communitySize  # Private backing store in RankConfig, leading underscore is intentional

# Type name length
type_name:
  min_length: 3
  max_length:
    warning: 50

# Trailing whitespace: Don't flag empty lines
trailing_whitespace:
  ignores_empty_lines: true

# Vertical whitespace: Allow up to 2 blank lines (section separators)
vertical_whitespace:
  max_empty_lines: 2

# ─── Custom Rules ─────────────────────────────────────────────────

custom_rules:
  # Flag any direct Brave API URL construction outside WebsiteCheckService
  brave_api_guard:
    name: "Brave API Usage Guard"
    regex: 'api\.search\.brave\.com'
    message: "Brave Search API calls must go through WebsiteCheckService only."
    severity: error

  # Flag hardcoded Firebase UIDs (should reference AdminAccess.adminUID)
  hardcoded_uid:
    name: "No Hardcoded Firebase UIDs"
    regex: '"FFrKO5dcaNNlTzM6msCXcLha1d33"'
    message: "Use AdminAccess.adminUID instead of hardcoding the admin UID."
    severity: warning
