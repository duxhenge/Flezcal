# .swiftlint.yml — Flezcal
# Tailored for SwiftUI + Firebase iOS app (66 source files)

# ─── Paths ─────────────────────────────────────────────────────────
included:
  - Flezcal
  - FlezcalTests
  - FlezcalUITests

excluded:
  - build
  - DerivedData
  - .build
  - Flezcal.xcodeproj

# ─── Enabled Opt-In Rules ──────────────────────────────────────────
opt_in_rules:
  # Safety
  - force_unwrapping
  - implicitly_unwrapped_optional
  - discouraged_optional_boolean

  # Code quality
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_first_not_nil
  - empty_collection_literal
  - empty_count
  - empty_string
  - fatal_error_message
  - first_where
  - identical_operands
  - joined_default_parameter
  - last_where
  - legacy_multiple
  - literal_expression_end_indentation
  - multiline_arguments
  - multiline_parameters
  - overridden_super_call
  - prefer_self_in_static_references
  - prefer_zero_over_explicit_init
  - redundant_nil_coalescing
  - sorted_first_last
  - toggle_bool
  - unavailable_function
  - unneeded_parentheses_in_closure_argument
  - yoda_condition

# ─── Disabled Rules ────────────────────────────────────────────────
disabled_rules:
  - trailing_comma
  - opening_brace
  - todo
  - nesting
  - large_tuple
  - multiple_closures_with_trailing_syntax

# ─── Rule Configuration ───────────────────────────────────────────

# File length: Largest file is 1383 lines (SpotDetailView).
file_length:
  warning: 600
  error: 1500
  ignore_comment_only_lines: true

# Type body length: SpotDetailView body is long due to SwiftUI composition.
type_body_length:
  warning: 500
  error: 1200

# Function body length: Most functions are short; a few service methods are long.
function_body_length:
  warning: 80
  error: 200

# Line length: Some SwiftUI chains and Firestore paths are long.
line_length:
  warning: 140
  error: 200
  ignores_urls: true
  ignores_comments: true
  ignores_interpolated_strings: true

# Cyclomatic complexity
cyclomatic_complexity:
  warning: 15
  error: 25
  ignores_case_statements: true

# Identifier names: Allow single-char names used in the codebase
identifier_name:
  min_length:
    warning: 1
  max_length:
    warning: 60
  excluded:
    - id
    - db
    - i
    - x
    - y

# Type name length
type_name:
  min_length: 3
  max_length:
    warning: 50

# Trailing whitespace: Don't flag empty lines
trailing_whitespace:
  ignores_empty_lines: true

# Vertical whitespace: Allow up to 2 blank lines (section separators)
vertical_whitespace:
  max_empty_lines: 2

# ─── Custom Rules ─────────────────────────────────────────────────

custom_rules:
  # NOTE: no_bare_print was removed because SwiftLint regex rules can't distinguish
  # prints inside #if DEBUG from bare prints. All current prints are already wrapped.
  # Use pre-release checklist to verify: grep -n 'print(' *.swift | grep -v '#if DEBUG'

  # Flag any direct Brave API URL construction outside WebsiteCheckService
  brave_api_guard:
    name: "Brave API Usage Guard"
    regex: 'api\.search\.brave\.com'
    message: "Brave Search API calls must go through WebsiteCheckService only."
    severity: error

  # Flag hardcoded Firebase UIDs (should reference AdminAccess.adminUID)
  hardcoded_uid:
    name: "No Hardcoded Firebase UIDs"
    regex: '"FFrKO5dcaNNlTzM6msCXcLha1d33"'
    message: "Use AdminAccess.adminUID instead of hardcoding the admin UID."
    severity: warning
